services:
  airflow-postgres:
    image: postgres:15
    container_name: mlops-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db-volume:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.10.2-python3.11
    container_name: mlops-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_started
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _PIP_ADDITIONAL_REQUIREMENTS: "boto3>=1.37.0 pydantic-settings>=2.7.0 wandb>=0.19.0"
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      TRAIN_QUEUE_URL: ${TRAIN_QUEUE_URL:-}
      INFER_QUEUE_URL: ${INFER_QUEUE_URL:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_PROJECT: ${WANDB_PROJECT:-tmdb-rating-mlops}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      QUALITY_GATE_VAL_RMSE_MAX: ${QUALITY_GATE_VAL_RMSE_MAX:-1.2}
      QUALITY_GATE_OUT_OF_RANGE_MAX: ${QUALITY_GATE_OUT_OF_RANGE_MAX:-0.05}
      PYTHONPATH: /opt/airflow/project
    volumes: &airflow-common-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/airflow/project
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname mlops
      --lastname team
      --role Admin
      --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.10.2-python3.11
    container_name: mlops-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: webserver
    ports:
      - "8085:8080"
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.2-python3.11
    container_name: mlops-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    restart: unless-stopped

volumes:
  airflow-postgres-db-volume:
