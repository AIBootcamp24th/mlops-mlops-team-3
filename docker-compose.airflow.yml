services:
  airflow-mysql:
    image: mysql:8.4
    container_name: mlops-airflow-mysql
    environment:
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow
      MYSQL_ROOT_PASSWORD: airflow-root
      TZ: Asia/Seoul
    volumes:
      - airflow-mysql-db-volume:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uairflow",
          "-pairflow",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.10.2-python3.11
    container_name: mlops-airflow-init
    depends_on:
      airflow-mysql:
        condition: service_healthy
    env_file:
      - .env
      - .env.secrets
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://airflow:airflow@airflow-mysql:3306/airflow?charset=utf8mb4
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW__WEBSERVER__BASE_URL:-https://www.dongsol.com/airflow}
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "boto3>=1.37.0 pydantic-settings>=2.7.0 wandb>=0.19.0 torch>=2.6.0 scikit-learn>=1.6.0 tqdm>=4.67.0 sqlalchemy<2 pymysql>=1.1.0"
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_SDK_LOAD_CONFIG: "1"
      TRAIN_QUEUE_URL: ${TRAIN_QUEUE_URL:-}
      INFER_QUEUE_URL: ${INFER_QUEUE_URL:-}
      WANDB_PROJECT: ${WANDB_PROJECT:-tmdb-rating-mlops}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      QUALITY_GATE_VAL_RMSE_MAX: ${QUALITY_GATE_VAL_RMSE_MAX:-1.2}
      QUALITY_GATE_OUT_OF_RANGE_MAX: ${QUALITY_GATE_OUT_OF_RANGE_MAX:-0.05}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      PYTHONPATH: /opt/airflow/project
    volumes: &airflow-common-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/airflow/project
      - ${HOME}/.aws:/home/airflow/.aws:ro

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username $${AIRFLOW_ADMIN_USERNAME:-admin}
      --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname mlops
      --lastname team
      --role Admin
      --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      "

  airflow-webserver:
    image: apache/airflow:2.10.2-python3.11
    container_name: mlops-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.secrets
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: webserver
    ports:
      - "8085:8080"
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.2-python3.11
    container_name: mlops-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - .env.secrets
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    restart: unless-stopped

volumes:
  airflow-mysql-db-volume:
