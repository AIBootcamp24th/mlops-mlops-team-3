name: Slackbot Maintenance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "실행 작업 선택"
        required: true
        default: validate
        type: choice
        options:
          - validate
          - notify
      message:
        description: "task=notify일 때 전송할 Slack 메시지"
        required: false
        default: "slackbot 수동 알림 테스트"

jobs:
  slackbot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slackbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Slack manifest JSON
        if: ${{ github.event.inputs.task == 'validate' }}
        run: bunx --bun node -e "JSON.parse(require('node:fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json is valid')"

      - name: Send Slack notification
        if: ${{ github.event.inputs.task == 'notify' }}
        run: bun run notify "${{ github.event.inputs.message }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
