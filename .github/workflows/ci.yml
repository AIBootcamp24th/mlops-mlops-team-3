name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  notify-success:
    if: ${{ success() }}
    needs: [test-and-lint]
    uses: ./.github/workflows/notify.yml
    with:
      status: success
      title: "CI 성공"
      message: "브랜치: ${{ github.ref_name }} / 커밋: ${{ github.sha }}"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

  notify-failure:
    if: ${{ failure() }}
    needs: [test-and-lint]
    uses: ./.github/workflows/notify.yml
    with:
      status: failure
      title: "CI 실패"
      message: "브랜치: ${{ github.ref_name }} / 실행 URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
