name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  notify-success:
    if: ${{ success() }}
    needs: [test-and-lint]
    uses: ./.github/workflows/notify.yml
    with:
      status: success
      title: "CI 통과했어요!"
      message: "한줄 요약: CI 통과 ✅ (테스트/린트 성공)\n\n짜잔! 테스트를 모두 성공했어요 ✨\n\n| 항목 | 값 |\n|---|---|\n| 이벤트 | ${{ github.event_name }} |\n| 브랜치 | ${{ github.ref_name }} |\n| 실행 URL | ${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }} |"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

  notify-failure:
    if: ${{ failure() }}
    needs: [test-and-lint]
    uses: ./.github/workflows/notify.yml
    with:
      status: failure
      title: "CI가 잠깐 넘어졌어요"
      message: "앗, 이번엔 실패했어요 🥲 로그에서 원인을 같이 찾아봐요! 이벤트: ${{ github.event_name }} | 브랜치: ${{ github.ref_name }} | 실행 URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
