name: CI

on:
  # 인프라 미구현 기간에는 자동 CI/CD를 잠시 중단합니다.
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  # 필요 시 이 워크플로우에 Slack 알림 잡을 직접 추가해 사용합니다.
