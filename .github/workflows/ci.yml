name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve project directory
        id: project_dir
        shell: bash
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
          elif [ -f "mlops_project/pyproject.toml" ]; then
            echo "path=mlops_project" >> "$GITHUB_OUTPUT"
          else
            echo "pyproject.toml을 찾을 수 없습니다." >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: ${{ steps.project_dir.outputs.path }}
        run: uv sync --dev

      - name: Ruff
        working-directory: ${{ steps.project_dir.outputs.path }}
        run: uv run ruff check .

      - name: Pytest
        working-directory: ${{ steps.project_dir.outputs.path }}
        run: uv run pytest -q

      - name: Quality Gate
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: ${{ steps.project_dir.outputs.path }}
        run: uv run python scripts/register_model.py
        env:
          PYTHONPATH: ${{ github.workspace }}/${{ steps.project_dir.outputs.path }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ secrets.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ secrets.WANDB_ENTITY }}
          QUALITY_GATE_REQUIRED: "false"
          QUALITY_GATE_VAL_RMSE_MAX: "1.2"
          QUALITY_GATE_OUT_OF_RANGE_MAX: "0.05"
