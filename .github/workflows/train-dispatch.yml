name: Train Dispatch

on:
  workflow_dispatch:
  # 인프라 미구현 기간에는 정기 실행을 중단합니다.
  # schedule:
  #   - cron: "0 2 * * *"

jobs:
  dispatch-train-message:
    # 인프라(DB/SQS) 미구현 기간에는 학습 디스패치를 중단합니다.
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Send SQS train message
        run: uv run python scripts/send_sqs_message.py
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TRAIN_QUEUE_URL: ${{ secrets.TRAIN_QUEUE_URL }}

  # 필요 시 dispatch 성공/실패 Slack 알림 잡을 이 파일 안에 직접 추가해 사용합니다.
