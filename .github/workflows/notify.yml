name: Reusable Slack Notify

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
      title:
        required: true
        type: string
      message:
        required: true
        type: string
    secrets:
      SLACK_BOT_TOKEN:
        required: true
      SLACK_CHANNEL_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send custom Slack message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          STATUS: ${{ inputs.status }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
        run: |
          if [ "$STATUS" = "success" ]; then
            COLOR="good"
            STATUS_EMOJI=":white_check_mark:"
          else
            COLOR="danger"
            STATUS_EMOJI=":x:"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "channel": "${SLACK_CHANNEL_ID}",
            "attachments": [
              {
                "color": "${COLOR}",
                "title": "${TITLE}",
                "text": "${MESSAGE}",
                "mrkdwn_in": ["text", "fields"],
                "fields": [
                  {
                    "title": "Status",
                    "value": "${STATUS_EMOJI} ${STATUS}",
                    "short": true
                  },
                  {
                    "title": "Repository",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Workflow",
                    "value": "${{ github.workflow }}",
                    "short": true
                  },
                  {
                    "title": "Run",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions 바로가기>",
                    "short": false
                  }
                ]
              }
            ]
          }
          EOF
          )

          response=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "${PAYLOAD}")

          echo "$response"
          echo "$response" | grep -q '"ok":true'
