name: Slackbot CI

on:
  # 소비 절감을 위해 자동 CI 트리거를 중단합니다.
  workflow_dispatch:

jobs:
  validate:
    # Slack 알림 전송을 포함한 워크플로우를 잠시 비활성화합니다.
    if: ${{ false }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slackbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Slack manifest JSON
        run: bunx --bun node -e "JSON.parse(require('node:fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json is valid')"

