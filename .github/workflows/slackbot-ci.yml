name: Slackbot CI

on:
  push:
    branches: [main, docs/alstjd0051]
    paths:
      - "slackbot/**"
      - ".github/workflows/slackbot-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "slackbot/**"
      - ".github/workflows/slackbot-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slackbot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Validate Slack manifest JSON
        run: bunx --bun node -e "JSON.parse(require('node:fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json is valid')"
