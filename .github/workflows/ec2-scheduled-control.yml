name: EC2 Scheduled Start Stop

on:
  workflow_dispatch:
    inputs:
      action:
        description: "start 또는 stop (비워두면 role별 운영시간 정책 적용)"
        required: false
        type: choice
        options:
          - start
          - stop
  schedule:
    # 평일 매시 5분: role별 시작/중지 시간 정책 판정
    - cron: "5 * * * 1-5"
    # 매일 00:05(KST): 종료일 강제 정지 및 야간 stop 보장
    - cron: "5 15 * * *"

permissions:
  contents: read

jobs:
  control:
    runs-on: ubuntu-latest
    env:
      PROJECT_START_DATE: "2026-02-27"
      PROJECT_STOP_DATE: "2026-03-13"
      PROJECT_ASG_NAME: "mlops-api-asg"
      PROJECT_DB_IDENTIFIER_PREFIX: "team-prj-group3-dev-mlops-db"
    steps:
      - name: Check orchestration period window
        id: period_guard
        shell: bash
        run: |
          set -euo pipefail
          today_kst="$(TZ=Asia/Seoul date +%Y-%m-%d)"
          if [[ "$today_kst" < "${PROJECT_START_DATE}" ]]; then
            echo "in_window=false" >> "$GITHUB_OUTPUT"
            echo "project_ended=false" >> "$GITHUB_OUTPUT"
          elif [[ "$today_kst" < "${PROJECT_STOP_DATE}" ]]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
            echo "project_ended=false" >> "$GITHUB_OUTPUT"
          else
            echo "in_window=false" >> "$GITHUB_OUTPUT"
            echo "project_ended=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.period_guard.outputs.in_window == 'true' || steps.period_guard.outputs.project_ended == 'true' }}
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: ${{ steps.period_guard.outputs.in_window == 'true' || steps.period_guard.outputs.project_ended == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force shutdown after project end date
        if: ${{ steps.period_guard.outputs.project_ended == 'true' }}
        id: force_shutdown
        shell: bash
        run: |
          set -euo pipefail

          target_file="config/ec2_schedule_targets.csv"
          mapfile -t target_names < <(
            awk -F',' '
              NR == 1 { next }
              {
                gsub(/^[ \t]+|[ \t]+$/, "", $1)
                if ($1 != "") print $1
              }
            ' "$target_file"
          )

          if [ "${#target_names[@]}" -eq 0 ]; then
            echo "강제 종료 대상 Name 태그가 없습니다: $target_file"
            exit 1
          fi

          names_csv=$(IFS=, ; echo "${target_names[*]}")
          total_stopped=0
          regions=$(aws ec2 describe-regions --query "Regions[].RegionName" --output text)

          for region in $regions; do
            rows=$(aws ec2 describe-instances \
              --region "$region" \
              --filters "Name=tag:Name,Values=${names_csv}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query "Reservations[].Instances[].[InstanceId,State.Name]" \
              --output text)

            stop_ids=()
            if [ -n "${rows:-}" ] && [ "$rows" != "None" ]; then
              while IFS=$'\t' read -r instance_id state; do
                if [ -z "${instance_id:-}" ] || [ "${instance_id}" = "None" ]; then
                  continue
                fi
                if [ "${state}" = "running" ] || [ "${state}" = "pending" ]; then
                  stop_ids+=("${instance_id}")
                fi
              done <<< "$rows"
            fi

            if [ "${#stop_ids[@]}" -gt 0 ]; then
              aws ec2 stop-instances --region "$region" --instance-ids "${stop_ids[@]}" >/dev/null
              total_stopped=$((total_stopped + ${#stop_ids[@]}))
            fi
          done

          asg_name="${PROJECT_ASG_NAME:-mlops-api-asg}"
          asg_exists=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$asg_name" \
            --query "length(AutoScalingGroups)" \
            --output text)

          if [ "${asg_exists}" != "0" ]; then
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "$asg_name" \
              --min-size 0 \
              --max-size 0 \
              --desired-capacity 0
            asg_result="scaled_to_zero"
          else
            asg_result="not_found"
          fi

          db_prefix="${PROJECT_DB_IDENTIFIER_PREFIX:-team-prj-group3-dev-mlops-db}"
          stopped_rds_instances=0
          stopped_aurora_clusters=0

          db_instance_rows=$(aws rds describe-db-instances \
            --query "DBInstances[].[DBInstanceIdentifier,DBInstanceStatus,Engine]" \
            --output text || true)
          if [ -n "${db_instance_rows:-}" ] && [ "${db_instance_rows}" != "None" ]; then
            while IFS=$'\t' read -r db_id db_status db_engine; do
              if [[ "${db_id:-}" != ${db_prefix}* ]]; then
                continue
              fi
              if [ "${db_status:-}" = "available" ] && [[ "${db_engine:-}" != aurora* ]]; then
                aws rds stop-db-instance --db-instance-identifier "${db_id}" >/dev/null
                stopped_rds_instances=$((stopped_rds_instances + 1))
              fi
            done <<< "$db_instance_rows"
          fi

          db_cluster_rows=$(aws rds describe-db-clusters \
            --query "DBClusters[].[DBClusterIdentifier,Status,Engine]" \
            --output text || true)
          if [ -n "${db_cluster_rows:-}" ] && [ "${db_cluster_rows}" != "None" ]; then
            while IFS=$'\t' read -r cluster_id cluster_status cluster_engine; do
              if [[ "${cluster_id:-}" != ${db_prefix}* ]]; then
                continue
              fi
              if [ "${cluster_status:-}" = "available" ] && [[ "${cluster_engine:-}" == aurora* ]]; then
                aws rds stop-db-cluster --db-cluster-identifier "${cluster_id}" >/dev/null
                stopped_aurora_clusters=$((stopped_aurora_clusters + 1))
              fi
            done <<< "$db_cluster_rows"
          fi

          generated_at_kst="$(TZ=Asia/Seoul date "+%Y-%m-%d %H:%M:%S %Z")"
          message=$(printf "[프로젝트 종료 강제 정지]\n- 적용 시각(KST): %s\n- 종료 기준일: %s (KST)\n- stop 처리 EC2 수: %s개\n- 대상 ASG: %s (%s)\n- stop 처리 RDS 인스턴스 수: %s개\n- stop 처리 Aurora 클러스터 수: %s개\n- 결과: 프로젝트 종료일 이후 운영 로직 비활성화 완료" \
            "$generated_at_kst" "${PROJECT_STOP_DATE}" "$total_stopped" "$asg_name" "$asg_result" "$stopped_rds_instances" "$stopped_aurora_clusters")
          {
            echo "slack_message<<EOF"
            echo "${message}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Start or stop target EC2 instances
        if: ${{ steps.period_guard.outputs.in_window == 'true' }}
        id: control
        shell: bash
        env:
          INPUT_ACTION: ${{ github.event.inputs.action }}
        run: |
          set -euo pipefail

          target_file="config/ec2_schedule_targets.csv"
          if [ ! -f "$target_file" ]; then
            echo "대상 CSV 파일이 없습니다: $target_file"
            exit 1
          fi

          mapfile -t target_rows < <(
            awk -F',' '
              NR == 1 { next }
              {
                for (i=1; i<=NF; i++) gsub(/^[ \t]+|[ \t]+$/, "", $i)
                if ($1 != "") print $1 "\t" $2 "\t" $3 "\t" $4 "\t" $5 "\t" $6 "\t" $7
              }
            ' "$target_file"
          )

          hour_kst=$(TZ=Asia/Seoul date "+%H")
          hour_kst=$((10#$hour_kst))
          mode="policy"
          resolved_action="${INPUT_ACTION:-}"
          if [ -n "$resolved_action" ]; then
            mode="manual"
          fi

          if [ -n "$resolved_action" ] && [ "$resolved_action" != "start" ] && [ "$resolved_action" != "stop" ]; then
            echo "action 값은 start 또는 stop 이어야 합니다."
            exit 1
          fi

          if [ "${#target_rows[@]}" -eq 0 ]; then
            echo "유효한 대상 인스턴스 이름이 없습니다."
            exit 1
          fi

          declare -A owner_map=()
          declare -A role_map=()
          declare -A env_map=()
          declare -A keepalive_map=()
          declare -A start_hour_map=()
          declare -A stop_hour_map=()
          target_names=()
          for row in "${target_rows[@]}"; do
            IFS=$'\t' read -r name owner role env keep_alive start_hour stop_hour <<< "$row"
            if [ -z "${name:-}" ]; then
              continue
            fi
            owner_map["$name"]="${owner:-unknown}"
            role_map["$name"]="${role:-api}"
            env_map["$name"]="${env:-prod}"
            keepalive_map["$name"]="${keep_alive:-false}"
            start_hour_map["$name"]="${start_hour:-9}"
            stop_hour_map["$name"]="${stop_hour:-24}"
            target_names+=("$name")
          done

          names_csv=$(IFS=, ; echo "${target_names[*]}")
          generated_at_kst=$(TZ=Asia/Seoul date "+%Y-%m-%d %H:%M:%S %Z")

          declare -A seen_name_map=()
          for name in "${target_names[@]}"; do
            seen_name_map["$name"]=0
          done

          total_target_instances=0
          total_start_instances=0
          total_stop_instances=0
          total_keepalive_skips=0
          details=""

          regions=$(aws ec2 describe-regions --query "Regions[].RegionName" --output text)

          for region in $regions; do
            rows=$(aws ec2 describe-instances \
              --region "$region" \
              --filters "Name=tag:Name,Values=${names_csv}" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query "Reservations[].Instances[].[InstanceId,State.Name,Tags[?Key=='Name']|[0].Value,Tags[?Key=='keep_alive']|[0].Value]" \
              --output text)

            if [ -z "$rows" ] || [ "$rows" = "None" ]; then
              continue
            fi

            details="${details}"$'\n'"*${region}*"$'\n'
            details="${details}INSTANCE_ID\tNAME\tROLE\t기존상태\t정책동작\t처리결과"$'\n'

            start_ids=()
            stop_ids=()
            while IFS=$'\t' read -r instance_id state name keep_alive_tag; do
              if [ -z "${instance_id:-}" ] || [ "${instance_id:-None}" = "None" ]; then
                continue
              fi

              if [ -z "${name:-}" ] || [ "${name:-None}" = "None" ]; then
                name="-"
              fi

              total_target_instances=$((total_target_instances + 1))
              if [ "${name}" != "-" ] && [ -n "${seen_name_map[$name]+x}" ]; then
                seen_name_map["$name"]=1
              fi

              role="${role_map[$name]:-api}"
              policy_keepalive="${keepalive_map[$name]:-false}"
              start_hour="${start_hour_map[$name]:-9}"
              stop_hour="${stop_hour_map[$name]:-24}"
              if [ -z "${keep_alive_tag:-}" ] || [ "${keep_alive_tag:-None}" = "None" ]; then
                keep_alive_tag="false"
              fi

              if [ "$mode" = "manual" ]; then
                row_action="$resolved_action"
              else
                row_action=""
                if [ "$hour_kst" -eq "$start_hour" ]; then
                  row_action="start"
                elif { [ "$stop_hour" -eq 24 ] && [ "$hour_kst" -eq 0 ]; } || [ "$hour_kst" -eq "$stop_hour" ]; then
                  row_action="stop"
                fi
              fi

              result="skip"
              action_text="${row_action:--}"
              should_skip_keepalive=0
              if [ "$row_action" = "stop" ] && { [ "$policy_keepalive" = "true" ] || [ "$keep_alive_tag" = "true" ]; }; then
                should_skip_keepalive=1
                total_keepalive_skips=$((total_keepalive_skips + 1))
                result="keep_alive 예외로 stop 제외"
              elif [ "$row_action" = "start" ] && [ "$state" = "stopped" ]; then
                start_ids+=("${instance_id}")
                result="start 요청"
              elif [ "$row_action" = "stop" ] && [ "$state" = "running" ]; then
                stop_ids+=("${instance_id}")
                result="stop 요청"
              else
                result="조건불일치(${state})"
              fi

              details="${details}${instance_id}\t${name}\t${role}\t${state}\t${action_text}\t${result}"$'\n'
            done <<< "$rows"

            if [ "${#start_ids[@]}" -gt 0 ]; then
              aws ec2 start-instances --region "$region" --instance-ids "${start_ids[@]}" >/dev/null
              total_start_instances=$((total_start_instances + ${#start_ids[@]}))
            fi
            if [ "${#stop_ids[@]}" -gt 0 ]; then
              aws ec2 stop-instances --region "$region" --instance-ids "${stop_ids[@]}" >/dev/null
              total_stop_instances=$((total_stop_instances + ${#stop_ids[@]}))
            fi
          done

          missing_names=()
          for name in "${target_names[@]}"; do
            if [ "${seen_name_map[$name]}" -eq 0 ]; then
              missing_names+=("${name}")
            fi
          done

          if [ "${#missing_names[@]}" -eq 0 ]; then
            missing_text="-"
          else
            missing_text=$(IFS=', '; echo "${missing_names[*]}")
          fi

          mode_text="정책기반(policy)"
          if [ "$mode" = "manual" ]; then
            mode_text="수동(${resolved_action})"
          fi

          message=$(printf "[EC2 스케줄 제어]\n- 조회 시각(KST): %s\n- 실행 모드: %s\n- 현재 시각(KST hour): %s\n- 대상 이름: %s\n- 조회된 대상 인스턴스 수: %s개\n- 실제 start 처리 수: %s개\n- 실제 stop 처리 수: %s개\n- keep_alive 예외 건수: %s개\n- AWS에서 찾지 못한 이름: %s\n%s" \
            "$generated_at_kst" "$mode_text" "$hour_kst" "$names_csv" "$total_target_instances" "$total_start_instances" "$total_stop_instances" "$total_keepalive_skips" "$missing_text" "$details")

          {
            echo "slack_message<<EOF"
            echo "${message}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check KST Slack notification window
        if: ${{ always() && steps.period_guard.outputs.in_window == 'true' }}
        id: notify_guard
        shell: bash
        run: |
          set -euo pipefail
          day_kst="$(TZ=Asia/Seoul date +%u)"
          hour_kst="$(TZ=Asia/Seoul date +%H)"
          hour_kst=$((10#$hour_kst))

          if [ "$day_kst" -ge 1 ] && [ "$day_kst" -le 5 ] && [ "$hour_kst" -ge 9 ] && [ "$hour_kst" -le 23 ]; then
            echo "notify_window=true" >> "$GITHUB_OUTPUT"
          else
            echo "notify_window=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack success notification
        if: ${{ success() && steps.period_guard.outputs.in_window == 'true' && steps.notify_guard.outputs.notify_window == 'true' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MESSAGE: ${{ steps.control.outputs.slack_message }}
        run: |
          payload=$(python - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "channel": os.environ["SLACK_CHANNEL_ID"],
                      "attachments": [
                          {
                              "color": "good",
                              "title": "AWS EC2 스케줄 실행/중단 결과",
                              "text": os.environ["MESSAGE"],
                          }
                      ],
                  }
              )
          )
          PY
          )

          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "${payload}"

      - name: Send Slack failure notification
        if: ${{ failure() && steps.period_guard.outputs.in_window == 'true' && steps.notify_guard.outputs.notify_window == 'true' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(python - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "channel": os.environ["SLACK_CHANNEL_ID"],
                      "attachments": [
                          {
                              "color": "danger",
                              "title": "AWS EC2 스케줄 실행/중단 실패",
                              "text": f"워크플로우 오류가 발생했습니다. 실행 URL: {os.environ['RUN_URL']}",
                          }
                      ],
                  }
              )
          )
          PY
          )

          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "${payload}"

      - name: Send Slack project stop notification (manual run)
        if: ${{ steps.period_guard.outputs.project_ended == 'true' && github.event_name == 'workflow_dispatch' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MESSAGE: ${{ steps.force_shutdown.outputs.slack_message }}
        run: |
          payload=$(python - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "channel": os.environ["SLACK_CHANNEL_ID"],
                      "attachments": [
                          {
                              "color": "warning",
                              "title": "프로젝트 종료일 이후 운영 중지 적용",
                              "text": os.environ["MESSAGE"],
                          }
                      ],
                  }
              )
          )
          PY
          )

          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "${payload}"
