name: CD API Deploy to AWS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: cd-api-deploy-main
  cancel-in-progress: true

jobs:
  deploy-api:
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch'
          && startsWith(github.ref, 'refs/tags/')
        )
        || (
          github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve deploy target dynamically
        shell: bash
        env:
          INSTANCE_ID: ${{ secrets.AWS_DEPLOY_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          REMOTE_USER_VAR: ${{ vars.AWS_DEPLOY_REMOTE_USER }}
          REMOTE_PORT_VAR: ${{ vars.AWS_DEPLOY_REMOTE_PORT }}
          REMOTE_DIR_VAR: ${{ vars.AWS_DEPLOY_REMOTE_DIR }}
          API_PORT_VAR: ${{ vars.AWS_DEPLOY_API_PORT }}
          PRUNE_REMOTE_VAR: ${{ vars.AWS_DEPLOY_PRUNE_REMOTE }}
        run: |
          set -euo pipefail

          INSTANCE_STATE="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)"

          if [[ "${INSTANCE_STATE}" == "stopping" ]]; then
            echo "instance is stopping -> wait stopped -> start"
            aws ec2 wait instance-stopped --region "${AWS_REGION}" --instance-ids "${INSTANCE_ID}"
            aws ec2 start-instances --region "${AWS_REGION}" --instance-ids "${INSTANCE_ID}" >/dev/null
          elif [[ "${INSTANCE_STATE}" == "stopped" ]]; then
            echo "instance is stopped -> start"
            aws ec2 start-instances --region "${AWS_REGION}" --instance-ids "${INSTANCE_ID}" >/dev/null
          elif [[ "${INSTANCE_STATE}" == "pending" ]]; then
            echo "instance is pending -> wait running"
          elif [[ "${INSTANCE_STATE}" != "running" ]]; then
            echo "ERROR: 지원하지 않는 인스턴스 상태입니다. state=${INSTANCE_STATE}"
            exit 1
          fi

          aws ec2 wait instance-running --region "${AWS_REGION}" --instance-ids "${INSTANCE_ID}"
          aws ec2 wait instance-status-ok --region "${AWS_REGION}" --instance-ids "${INSTANCE_ID}"

          INSTANCE_REACHABILITY="$(aws ec2 describe-instance-status \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --include-all-instances \
            --query "InstanceStatuses[0].InstanceStatus.Details[?Name=='reachability']|[0].Status" \
            --output text)"
          SYSTEM_REACHABILITY="$(aws ec2 describe-instance-status \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --include-all-instances \
            --query "InstanceStatuses[0].SystemStatus.Details[?Name=='reachability']|[0].Status" \
            --output text)"

          echo "instance_reachability=${INSTANCE_REACHABILITY}"
          echo "system_reachability=${SYSTEM_REACHABILITY}"

          if [[ "${INSTANCE_REACHABILITY}" == "failed" || "${SYSTEM_REACHABILITY}" == "failed" ]]; then
            echo "ERROR: 배포 대상 인스턴스 Reachability check가 실패 상태입니다."
            echo "       EC2 재부팅 또는 네트워크(SSM/SSH) 상태 복구 후 재시도하세요."
            exit 1
          fi

          REMOTE_HOST="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)"

          if [[ -z "${REMOTE_HOST}" || "${REMOTE_HOST}" == "None" ]]; then
            echo "ERROR: 대상 인스턴스의 Public IP를 확인할 수 없습니다."
            exit 1
          fi

          IMAGE_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query "Reservations[0].Instances[0].ImageId" \
            --output text)"
          IMAGE_NAME="$(aws ec2 describe-images \
            --region "${AWS_REGION}" \
            --image-ids "${IMAGE_ID}" \
            --query "Images[0].Name" \
            --output text)"
          IMAGE_NAME_LC="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"

          if [[ -n "${REMOTE_USER_VAR}" ]]; then
            REMOTE_USER="${REMOTE_USER_VAR}"
          elif [[ "${IMAGE_NAME_LC}" == *ubuntu* ]]; then
            REMOTE_USER="ubuntu"
          elif [[ "${IMAGE_NAME_LC}" == *amzn* || "${IMAGE_NAME_LC}" == *amazon* || "${IMAGE_NAME_LC}" == *al2023* ]]; then
            REMOTE_USER="ec2-user"
          else
            REMOTE_USER="ubuntu"
          fi

          REMOTE_PORT="${REMOTE_PORT_VAR:-22}"
          API_PORT="${API_PORT_VAR:-8000}"
          PRUNE_REMOTE="${PRUNE_REMOTE_VAR:-true}"

          if [[ -n "${REMOTE_DIR_VAR}" ]]; then
            REMOTE_DIR="${REMOTE_DIR_VAR}"
          else
            REMOTE_DIR="/home/${REMOTE_USER}/team_mlops/mlops_project"
          fi

          echo "DEPLOY_REMOTE_HOST=${REMOTE_HOST}" >> "${GITHUB_ENV}"
          echo "DEPLOY_REMOTE_USER=${REMOTE_USER}" >> "${GITHUB_ENV}"
          echo "DEPLOY_REMOTE_PORT=${REMOTE_PORT}" >> "${GITHUB_ENV}"
          echo "DEPLOY_REMOTE_DIR=${REMOTE_DIR}" >> "${GITHUB_ENV}"
          echo "DEPLOY_API_PORT=${API_PORT}" >> "${GITHUB_ENV}"
          echo "DEPLOY_PRUNE_REMOTE=${PRUNE_REMOTE}" >> "${GITHUB_ENV}"

          echo "resolved_remote_host=${REMOTE_HOST}"
          echo "resolved_remote_user=${REMOTE_USER}"
          echo "resolved_remote_port=${REMOTE_PORT}"
          echo "resolved_remote_dir=${REMOTE_DIR}"

      - name: Package deploy bundle
        shell: bash
        env:
          PACKAGE_BUCKET: ${{ secrets.AWS_S3_RAW_BUCKET }}
        run: |
          set -euo pipefail
          test -n "${PACKAGE_BUCKET}"
          mkdir -p .tmp
          tar -C mlops_project -czf .tmp/mlops_project.tar.gz .
          PACKAGE_KEY="deploy/api/${GITHUB_SHA}/mlops_project.tar.gz"
          aws s3 cp .tmp/mlops_project.tar.gz "s3://${PACKAGE_BUCKET}/${PACKAGE_KEY}"
          echo "DEPLOY_PACKAGE_BUCKET=${PACKAGE_BUCKET}" >> "${GITHUB_ENV}"
          echo "DEPLOY_PACKAGE_KEY=${PACKAGE_KEY}" >> "${GITHUB_ENV}"

      - name: Deploy API to AWS EC2 via SSM
        timeout-minutes: 50
        shell: bash
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ secrets.AWS_DEPLOY_INSTANCE_ID }}
          REMOTE_DIR: ${{ env.DEPLOY_REMOTE_DIR }}
          API_PORT: ${{ env.DEPLOY_API_PORT }}
          PRUNE_REMOTE: ${{ env.DEPLOY_PRUNE_REMOTE }}
          DEPLOY_PACKAGE_BUCKET: ${{ env.DEPLOY_PACKAGE_BUCKET }}
          DEPLOY_PACKAGE_KEY: ${{ env.DEPLOY_PACKAGE_KEY }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_PACKAGE_BUCKET}"
          test -n "${DEPLOY_PACKAGE_KEY}"
          PACKAGE_URI="s3://${DEPLOY_PACKAGE_BUCKET}/${DEPLOY_PACKAGE_KEY}"

          PARAMS_JSON="$(python - <<'PY'
          import json, os
          package_uri = f"s3://{os.environ['DEPLOY_PACKAGE_BUCKET']}/{os.environ['DEPLOY_PACKAGE_KEY']}"
          remote_dir = os.environ["REMOTE_DIR"]
          api_port = os.environ["API_PORT"]
          prune_remote = os.environ["PRUNE_REMOTE"]
          commands = [
              "set -euo pipefail",
              "command -v aws >/dev/null 2>&1 || { echo 'ERROR: aws cli not found on instance'; exit 1; }",
              "command -v docker >/dev/null 2>&1 || { echo 'ERROR: docker not found on instance'; exit 1; }",
              f"REMOTE_DIR='{remote_dir}'",
              f"PACKAGE_URI='{package_uri}'",
              "TMP_DIR=\"/tmp/mlops-api-deploy-$(date +%s)\"",
              "mkdir -p \"${TMP_DIR}\" \"${REMOTE_DIR}\"",
              "aws s3 cp \"${PACKAGE_URI}\" \"${TMP_DIR}/mlops_project.tar.gz\"",
              "tar -xzf \"${TMP_DIR}/mlops_project.tar.gz\" -C \"${REMOTE_DIR}\"",
              "cd \"${REMOTE_DIR}\"",
              "chmod +x scripts/deploy_api_on_instance.sh",
              f"REMOTE_DIR='{remote_dir}' API_PORT='{api_port}' PRUNE_REMOTE='{prune_remote}' bash scripts/deploy_api_on_instance.sh",
          ]
          print(json.dumps({"commands": commands}))
          PY
          )"

          COMMAND_ID="$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy API via SSM" \
            --parameters "${PARAMS_JSON}" \
            --query "Command.CommandId" \
            --output text)"

          echo "ssm_command_id=${COMMAND_ID}"

          STATUS="Pending"
          for _ in $(seq 1 180); do
            STATUS="$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")"
            echo "ssm_status=${STATUS}"
            case "${STATUS}" in
              Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated|InvalidPlatform|AccessDenied)
                break
                ;;
            esac
            sleep 10
          done

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text || true

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query "StandardErrorContent" \
            --output text || true

          if [[ "${STATUS}" != "Success" ]]; then
            echo "ERROR: SSM 배포 명령 실패 status=${STATUS}"
            exit 1
          fi

      - name: Ensure CloudWatch Agent via SSM
        shell: bash
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ secrets.AWS_DEPLOY_INSTANCE_ID }}
        run: |
          set -euo pipefail
          PARAMS_JSON='{"commands":["set -euo pipefail","if command -v dnf >/dev/null 2>&1; then sudo dnf install -y amazon-cloudwatch-agent >/dev/null; elif command -v yum >/dev/null 2>&1; then sudo yum install -y amazon-cloudwatch-agent >/dev/null; elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update -y >/dev/null && sudo apt-get install -y amazon-cloudwatch-agent >/dev/null; else echo ERROR: unsupported package manager; exit 1; fi","sudo mkdir -p /opt/aws/amazon-cloudwatch-agent/etc","sudo tee /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json >/dev/null <<'\''EOF'\''\n{\n  \"agent\": {\n    \"metrics_collection_interval\": 60,\n    \"run_as_user\": \"root\"\n  },\n  \"metrics\": {\n    \"namespace\": \"CWAgent\",\n    \"append_dimensions\": {\n      \"InstanceId\": \"${aws:InstanceId}\"\n    },\n    \"aggregation_dimensions\": [[\"InstanceId\"]],\n    \"metrics_collected\": {\n      \"disk\": {\n        \"measurement\": [\"used_percent\"],\n        \"resources\": [\"/\"],\n        \"ignore_file_system_types\": [\"sysfs\", \"devtmpfs\", \"tmpfs\", \"overlay\", \"squashfs\"]\n      }\n    }\n  }\n}\nEOF","sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s >/dev/null","sudo systemctl enable amazon-cloudwatch-agent >/dev/null","sudo systemctl restart amazon-cloudwatch-agent","sudo systemctl is-active --quiet amazon-cloudwatch-agent"]}'

          COMMAND_ID="$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Ensure CloudWatch Agent via SSM" \
            --parameters "${PARAMS_JSON}" \
            --query "Command.CommandId" \
            --output text)"

          STATUS="Pending"
          for _ in $(seq 1 60); do
            STATUS="$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")"
            case "${STATUS}" in
              Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated|InvalidPlatform|AccessDenied)
                break
                ;;
            esac
            sleep 5
          done

          if [[ "${STATUS}" != "Success" ]]; then
            echo "ERROR: CloudWatch Agent 보장 실패 status=${STATUS}"
            exit 1
          fi
