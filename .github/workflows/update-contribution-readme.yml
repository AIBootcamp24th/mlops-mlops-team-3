name: Update Contribution README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update contribution table
        run: python scripts/update_contribution_badges.py

      - name: Check README changes
        id: readme-changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README 변경사항 없음"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push README update branch
        if: steps.readme-changes.outputs.changed == 'true'
        run: |
          BRANCH="bot/update-contribution-readme"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add README.md
          git commit -m "문서: main 브랜치 기준 기여도 자동 갱신"
          git push -f origin "$BRANCH"
          echo "브랜치 푸시 완료: $BRANCH"
          echo "수동 PR 생성: https://github.com/${{ github.repository }}/pull/new/$BRANCH"

