name: Update Contribution README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update contribution table
        run: python scripts/update_contribution_badges.py

      - name: Check README changes
        id: readme-changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README 변경사항 없음"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request for README update
        if: steps.readme-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "문서: main 브랜치 기준 기여도 자동 갱신"
          title: "문서: 기여도 표 자동 갱신"
          body: |
            GitHub Actions가 README 기여도 표를 자동으로 갱신했습니다.
            Ruleset(직접 push 제한)을 준수하기 위해 PR 방식으로 반영합니다.
          branch: "bot/update-contribution-readme"
          delete-branch: true
          add-paths: |
            README.md
          labels: |
            documentation
            automated

