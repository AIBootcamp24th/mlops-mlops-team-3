services:
  trainer-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: trainer-runtime
    container_name: mlops-trainer-worker
    env_file:
      - .env
    command: ["uv", "run", "python", "-m", "src.train.run_train"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: mlops-api
    env_file:
      - .env
    command: ["uv", "run", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: mlops-api-dev
    env_file:
      - .env
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "src",
      ]
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
